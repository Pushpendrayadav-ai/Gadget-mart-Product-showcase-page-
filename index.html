<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Mart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="Product">
            <h1><big>GADGET MART</big></h1>
            <img src="./gadgetimage.png" height="100" width="130" alt="Gadget image">
        </div>
    <input type="text"  placeholder="Search Product">
    </header>

    <main>
        <h2>Browse products</h2>

        <figure class="card">
            <img src="./headphoneimage.png" height="140" width="170" alt="Boat Headphone">
            <figcaption class="title">Boat Headphone</figcaption>
            <p class="price">₹1,499</p>
            <ul>
                <li>Bluetooth 5.0</li>
                <li>20 Hours Battery</li>
                <li>Noise Cancellation</li>
                <li>warranty upto 2 years</li>
            </ul>
        </figure>

        <figure class="card">
            <img src="./laptopimage.png" height="190" width="220" alt="Laptop">
            <figcaption class="title">Apple Macbook Air(M5,2026) </figcaption>
            <p class="price">₹1,10,000</p>
            <ul>
                <li>Apple M5</li>
                <li>16 GB | 512 GB — Smooth gaming and video editing experience</li>
                <li>13.6 Inch | liquid retina Display — Clear and detailed visuals.</li>
                <li>1.55 Kg — Easy to carry</li>
            </ul>
        </figure>

        <figure class="card">
            <img src="./speakerimage.png" height="190" width="200" alt="Speaker">
            <figcaption class="title" >JBL Speaker </figcaption>
            <p class="price">₹3,999</p>
            <ul>
                <li>With Bluetooth</li>
                <li>40 W Power Output</li>
                <li>Configuration: Mono</li>
                <li>4 hrs Charging Time</li>
            </ul>
        </figure>

        <figure class="card">
            <img src="./watchimage.png" height="190" width="180" alt="Sonata Watch">
            <figcaption class="title">Sonata Watch</figcaption>
            <p class="price">₹7,999</p>
            <ul>
                <li>Formal</li>
                <li>Diameter: 42 mm</li>
                <li>Color</li>
                <li>Water Resistant</li>
            </ul>
        </figure>

    </main>

    <footer class="gadget">
        <p>&copy; 2006 Gadget. All rights reserved.</p>
        <p>Contact us: <a href="mailto:support@gadget.com">support@gadget.com</a></p>
    </footer>

</body>
</html>
